<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Duolingo Learn</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="css/dashboard.css">
<link rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>

<body>

<div class="container-fluid">

<div class="row">

<!-- Sidebar -->

<div class="col-lg-2 sidebar d-none d-lg-block">

<h2 class="logo">
    <i class="bi bi-globe-americas-fill logo-icon"></i>
    Duolingo
</h2>

<ul class="nav flex-column mt-4">

<li class="nav-item">
<a class="nav-link active" href="#">Learn</a>
</li>

<li class="nav-item">
<a class="nav-link" href="leaderboard.html">Leaderboard</a>
</li>

<li class="nav-item">
<a class="nav-link" href="profile.html">Profile</a>
</li>

<li class="nav-item">
<a class="nav-link" href="shop.html">Shop</a>
</li>

</ul>

</div>

<!-- Main Content -->

<div class="col-lg-7 col-md-12 lesson-area">

<div class="top-stats">

<span>
    <i class="bi bi-fire stat-fire"></i>
    15
</span>

<span>
    <i class="bi bi-heart-fill stat-heart"></i>
    5
</span>

<span>
    <i class="bi bi-star-fill stat-star"></i>
    250 XP
</span>

</div>

<h3 class="text-center mt-4 mb-5">
Spanish Course
</h3>

<div class="lesson-path">

<div class="lesson completed">
    <i class="bi bi-check-lg"></i>
</div>

<div class="lesson active">
1
</div>

<div class="lesson">
2
</div>

<div class="lesson">
3
</div>

<div class="lesson">
4
</div>

<div class="lesson">
5
</div>

</div>

<div class="text-center mt-4">

<button class="btn btn-success btn-lg px-5" id="startLesson">
Start Lesson
</button>

</div>

</div>

<!-- Right Panel -->

<div class="col-lg-3 right-panel d-none d-lg-block">

<div class="card mb-3">

<div class="card-body text-center">

<h5>Daily Goal</h5>

<h3>20 XP</h3>

</div>

</div>

<div class="card">

<div class="card-body text-center">

<h5>Current Streak</h5>
<h2>
    15 Days
    <i class="bi bi-fire streak-icon"></i>
</h2>

</div>

</div>

</div>

</div>

</div>

<!-- Mobile Bottom Nav -->

<div class="mobile-nav d-lg-none">

<a href="#" class="active">Learn</a>

<a href="leaderboard.html">Rank</a>

<a href="profile.html">Profile</a>

<a href="shop.html">Shop</a>

</div>

<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script src="js/dashboard.js"></script>

</body>
</html>
