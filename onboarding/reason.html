<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Reason</title>

 <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"> 

<link rel="stylesheet" href="../css/onboarding.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>

<body>

<div class="container">

<div class="row justify-content-center">

<div class="col-lg-6 col-md-8 col-sm-12">

<div class="progress mt-4 mb-5">

<div class="progress-bar bg-success"
style="width:35%">
</div>

</div>

<div class="text-center">

<img src="https://cdn-icons-png.flaticon.com/512/616/616430.png"
class="duo-img">

<h2 class="main-title">
Why are you learning?
</h2>

<p class="subtitle">
Choose the option that fits you best.
</p>

</div>
<div class="reason-card">
    <i class="bi bi-airplane-fill reason-icon"></i>
    Travel
</div>

<div class="reason-card">
    <i class="bi bi-mortarboard-fill reason-icon"></i>
    School
</div>

<div class="reason-card">
    <i class="bi bi-briefcase-fill reason-icon"></i>
    Career
</div>

<div class="reason-card">
    <i class="bi bi-people-fill reason-icon"></i>
    Family & Friends
</div>

<div class="reason-card">
    <i class="bi bi-palette-fill reason-icon"></i>
    Culture
</div>

<div class="reason-card">
    <i class="bi bi-lightbulb-fill reason-icon"></i>
    Brain Training
</div>

<div class="reason-card">
    <i class="bi bi-heart-fill reason-icon"></i>
    Just For Fun
</div>

<button
id="reasonContinueBtn"
class="btn btn-success continue-btn w-100"
disabled>

Continue

</button>

</div>
</div>
</div>

<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

<script src="../js/onboarding.js"></script>

</body>
</html>
