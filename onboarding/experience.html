<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Experience</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet" href="../css/onboarding.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>

<body>

<div class="container">

<div class="row justify-content-center">

<div class="col-lg-6 col-md-8 col-sm-12">

<div class="progress mt-4 mb-5">

<div class="progress-bar bg-success"
style="width:55%">
</div>

</div>

<div class="text-center">

<img src="https://cdn-icons-png.flaticon.com/512/616/616430.png"
class="duo-img">

<h2 class="main-title">
How much do you know?
</h2>

<p class="subtitle">
We'll customize lessons for you.
</p>

</div>

<div class="experience-card">
    <i class="bi bi-seedling-fill experience-icon"></i>
    <span>I'm completely new</span>
</div>

<div class="experience-card">
    <i class="bi bi-book-fill experience-icon"></i>
    <span>I know some words</span>
</div>

<div class="experience-card">
    <i class="bi bi-chat-dots-fill experience-icon"></i>
    <span>I can have simple conversations</span>
</div>

<div class="experience-card">
    <i class="bi bi-bullseye experience-icon"></i>
    <span>Intermediate or above</span>
</div>

<button
id="continueBtn"
class="btn btn-success continue-btn w-100"
disabled>

Continue

</button>

</div>
</div>
</div>

<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

<script src="../js/onboarding.js"></script>

</body>
</html>
