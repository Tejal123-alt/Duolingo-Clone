<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Daily Goal</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet" href="../css/onboarding.css">

</head>

<body>

<div class="container">

<div class="row justify-content-center">

<div class="col-lg-6 col-md-8 col-sm-12">

<div class="progress mt-4 mb-5">

<div class="progress-bar bg-success"
style="width:15%">
</div>

</div>

<div class="text-center">

<img src="https://cdn-icons-png.flaticon.com/512/616/616430.png"
class="duo-img">

<h2 class="main-title">
Choose your daily goal
</h2>

<p class="subtitle">
Practice every day to build a learning habit.
</p>

</div>

<div class="goal-card">
<h5>Casual</h5>
<p>5 minutes a day</p>
</div>

<div class="goal-card">
<h5>Regular</h5>
<p>10 minutes a day</p>
</div>

<div class="goal-card">
<h5>Serious</h5>
<p>15 minutes a day</p>
</div>

<div class="goal-card">
<h5>Intense</h5>
<p>20 minutes a day</p>
</div>

<button
id="goalContinueBtn"
class="btn btn-success continue-btn w-100"
disabled>

Continue

</button>

</div>
</div>
</div>

<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

<script src="../js/onboarding.js"></script>

</body>
</html>
