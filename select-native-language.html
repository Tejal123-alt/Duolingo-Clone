<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Select Native Language | Duolingo</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
    background:#f7f7f7;
    font-family:'Arial',sans-serif;
    min-height:100vh;
}
/*  Logo */

.logo{
    text-align:center;
    margin-top:30px;
    margin-bottom:20px;
    color:#58CC02;
    font-weight:900;
    font-size:42px;

    display:flex;
    justify-content:center;
    align-items:center;
    gap:12px;
}

/* Globe */

.world-logo{
    width:50px;
    height:50px;
    border-radius:50%;
    background:#1CB0F6;
    position:relative;
    overflow:hidden;
    box-shadow:0 3px 8px rgba(0,0,0,0.12);
}

/* Continents */

.world-logo::before{
    content:"";
    position:absolute;
    width:22px;
    height:22px;
    background:#58CC02;
    border-radius:50% 40% 50% 30%;
    top:8px;
    left:5px;
    transform:rotate(-20deg);
}

.world-logo::after{
    content:"";
    position:absolute;
    width:18px;
    height:18px;
    background:#58CC02;
    border-radius:40% 60% 40% 60%;
    bottom:8px;
    right:6px;
    transform:rotate(25deg);
}

/* Tablet */

@media(max-width:768px){

    .logo{
        font-size:34px;
    }

    .world-logo{
        width:42px;
        height:42px;
    }

    .world-logo::before{
        width:18px;
        height:18px;
    }

    .world-logo::after{
        width:14px;
        height:14px;
    }
}

/* Mobile */

@media(max-width:576px){

    .logo{
        font-size:28px;
        gap:8px;
    }

    .world-logo{
        width:34px;
        height:34px;
    }

    .world-logo::before{
        width:14px;
        height:14px;
        top:6px;
        left:4px;
    }

    .world-logo::after{
        width:12px;
        height:12px;
        bottom:5px;
        right:4px;
    }
}

/* CSS Globe */

.globe-icon{
    width:45px;
    height:45px;
    border-radius:50%;
    background:#1CB0F6;
    position:relative;
    overflow:hidden;
}

/* Vertical Lines */
.globe-icon::before{
    content:"";
    position:absolute;
    top:0;
    left:50%;
    transform:translateX(-50%);
    width:3px;
    height:100%;
    background:white;
    box-shadow:
        -12px 0 0 white,
        12px 0 0 white;
}

/* Horizontal Lines */
.globe-icon::after{
    content:"";
    position:absolute;
    top:50%;
    left:0;
    width:100%;
    height:3px;
    background:white;
    transform:translateY(-50%);
    box-shadow:
        0 -12px 0 white,
        0 12px 0 white;
}

/* Main Card */

.language-box{
    background:white;
    border-radius:20px;
    padding:30px;
    box-shadow:0 3px 15px rgba(0,0,0,.08);
}

.language-box h4{
    font-weight:700;
    color:#4b4b4b;
}

/* Language Items */

.language-item{
    display:flex;
    align-items:center;
    padding:15px;
    border-radius:12px;
    cursor:pointer;
    transition:.3s;
    margin-bottom:5px;
}

.language-item:hover{
    background:#f1f1f1;
    transform:translateX(5px);
}

.flag{
    width:60px;
    font-size:30px;
}

/* Responsive */

@media(max-width:768px){

    .logo{
        font-size:34px;
    }

    .globe-icon{
        width:38px;
        height:38px;
    }

    .language-box{
        padding:25px;
    }
}

@media(max-width:576px){

    .logo{
        font-size:28px;
        gap:8px;
    }

    .globe-icon{
        width:30px;
        height:30px;
    }

    .language-box{
        padding:20px;
    }

    .language-item{
        padding:12px;
        font-size:15px;
    }

    .flag{
        width:45px;
        font-size:24px;
    }
}

</style>

</head>

<body>

<div class="container">

    <!-- Logo -->

    <h1 class="logo">
    <span class="world-logo"></span>
    Duolingo
</h1>

    <!-- Language Selection Card -->

    <div class="row justify-content-center">

        <div class="col-lg-7 col-md-9 col-sm-12">

            <div class="language-box mt-4">

                <h4 class="mb-4">
                    What language do you speak?
                </h4>

                <div class="language-item">
                    <span class="flag">🇮🇳</span>
                    Hindi
                </div>

                <div class="language-item">
                    <span class="flag">🇺🇸</span>
                    English
                </div>

                <div class="language-item">
                    <span class="flag">🇫🇷</span>
                    French
                </div>

                <div class="language-item">
                    <span class="flag">🇩🇪</span>
                    German
                </div>

                <div class="language-item">
                    <span class="flag">🇯🇵</span>
                    Japanese
                </div>

                <div class="language-item">
                    <span class="flag">🇰🇷</span>
                    Korean
                </div>

                <div class="language-item">
                    <span class="flag">🇪🇸</span>
                    Spanish
                </div>

                <div class="language-item">
                    <span class="flag">🇨🇳</span>
                    Chinese
                </div>

                <div class="language-item">
                    <span class="flag">🇷🇺</span>
                    Russian
                </div>

                <div class="language-item">
                    <span class="flag">🇮🇹</span>
                    Italian
                </div>

                <div class="language-item">
                    <span class="flag">🇵🇹</span>
                    Portuguese
                </div>

                <div class="language-item">
                    <span class="flag">🇹🇷</span>
                    Turkish
                </div>

            </div>

        </div>

    </div>

</div>

<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

<script>

$(document).ready(function(){

    $(".language-item").click(function(){

        localStorage.setItem(
            "nativeLanguage",
            $(this).text().trim()
        );

        window.location.href = "onboarding/goal.html";
    });

});

</script>

</body>
</html>
