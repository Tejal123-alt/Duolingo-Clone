<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Profile | Duolingo</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
rel="stylesheet">

<link rel="stylesheet" href="css/profile.css">
<link rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>

<body>

<nav class="navbar navbar-light bg-white shadow-sm">

<div class="container">

<a href="learn.html" class="btn btn-outline-success">
<i class="bi bi-arrow-left"></i> Back
</a>

<h4 class="m-0 fw-bold text-success">
Duolingo
</h4>

</div>

</nav>

<div class="container py-5">

<div class="row justify-content-center">

<div class="col-lg-8">

<div class="profile-card">

<div class="text-center">

<img src="https://cdn-icons-png.flaticon.com/512/847/847969.png"
class="profile-img">

<h2 id="userName">
User Name
</h2>

<p id="userEmail" class="text-muted">
user@email.com
</p>

</div>

<hr>

<div class="row text-center">

<div class="col-md-4 mb-3">

<div class="stat-box">

<h3>
<i class="bi bi-fire stat-fire"></i>
15
</h3>

<p>Day Streak</p>

</div>

</div>

<div class="col-md-4 mb-3">

<div class="stat-box">

<h3>
<i class="bi bi-star-fill stat-star"></i>
250
</h3>

<p>Total XP</p>

</div>

</div>

<div class="col-md-4 mb-3">

<div class="stat-box">

<h3>
<i class="bi bi-globe-americas languages-icon"></i>
2
</h3>

<p>Languages</p>

</div>

</div>

</div>

<hr>

<h4 class="mb-3">
Achievements
</h4>

<div class="achievement-list">

<div class="achievement-item">
<i class="bi bi-trophy-fill achievement-icon"></i>
First Lesson Completed
</div>

<div class="achievement-item">
<i class="bi bi-fire achievement-icon"></i>
7 Day Streak
</div>

<div class="achievement-item">
<i class="bi bi-star-fill achievement-icon"></i>
Earned 100 XP
</div>

<div class="achievement-item">
<i class="bi bi-bullseye achievement-icon"></i>
Completed Beginner Unit
</div>

</div>

<hr>

<button
id="logoutBtn"
class="btn btn-danger w-100">

Logout

</button>

</div>

</div>

</div>

</div>

<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

<script src="js/profile.js"></script>

</body>
</html>
